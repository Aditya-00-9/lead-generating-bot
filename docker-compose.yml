services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
    command: python -m app.scheduler.apscheduler_job
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kramaai_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kramaai_leads"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
