services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
    ports:
      - "8000:8000"
    depends_on:
      - db

  scheduler:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
      SYNC_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/kramaai_leads
    command: python -m app.scheduler.apscheduler_job
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kramaai_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
